name: lol_shap_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pandas
  - numpy
  - pyarrow
  - xgboost
  - lightgbm
  - scikit-learn
  - shap
  - matplotlib
  - seaborn
  - jupyter
  - tqdm
  - requests
  - pip:
      - riotwatcher
      - python-dotenv
      - torch --index-url https://download.pytorch.org/whl/cpu
